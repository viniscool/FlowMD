<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>FlowMD — Sign in</title><link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet"><link rel="stylesheet" href="common.css"><style>.auth{min-height:100vh;display:grid;place-items:center;width:100%}.auth-card{width:min(420px,calc(100% - 36px));background:white;border:1px solid var(--line);border-radius:14px;padding:38px}.auth-card h1{font:700 26px Manrope}.auth-card p{color:var(--muted);line-height:1.6}.full{width:100%;background:#4f987e;color:white;border:0;margin-top:5px}.note{font-size:11px;text-align:center}</style></head><body><main class="auth"><section class="auth-card"><div class="logo"><i>✦</i>flow<span style="color:#5b9f89">md</span></div><h1>Welcome back</h1><p>Sign in to your clinical workspace.</p><form id="login"><label>Email</label><input class="input" type="email" value="doctor@flowmd.demo" required><label>Password</label><input class="input" type="password" value="demo1234" required><button class="button full">Sign in to FlowMD</button></form><p class="note">Demo mode · Your data stays in this browser.</p><p style="text-align:center"><a href="index.html" style="color:#4b8d7a">Continue to dashboard →</a></p></section></main><script>document.querySelector('#login').onsubmit=e=>{e.preventDefault();localStorage.setItem('flowmd-user','Dr. K. Morgan');location.href='index.html'}</script></body></html>
